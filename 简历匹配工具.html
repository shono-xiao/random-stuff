<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>批量简历匹配 · beiyu-notes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Microsoft YaHei",sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex}
.sidebar{width:220px;background:#16213e;padding:24px 16px;display:flex;flex-direction:column;gap:12px;flex-shrink:0}
.sidebar h2{color:#e94560;font-size:18px;margin-bottom:8px}
.sidebar p{color:#888;font-size:12px;line-height:1.6}
.main{flex:1;padding:24px;overflow-y:auto}
.card{background:#16213e;border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{color:#e94560;margin-bottom:12px;font-size:14px;text-transform:uppercase;letter-spacing:1px}
textarea{width:100%;min-height:120px;background:#0f3460;border:1px solid #333;border-radius:8px;color:#e0e0e0;padding:14px;font-size:14px;resize:vertical;font-family:inherit}
textarea:focus{outline:none;border-color:#e94560}
.btn{background:#e94560;color:#fff;border:none;padding:12px 32px;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600;transition:background .2s}
.btn:hover{background:#c73852}
.btn:disabled{background:#444;cursor:not-allowed}
.btn-sm{background:#0f3460;color:#e0e0e0;border:1px solid #333;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;margin:2px}
.btn-sm.active{background:#e94560;border-color:#e94560}
table{width:100%;border-collapse:collapse;margin-top:12px}
th{text-align:left;padding:10px 14px;font-size:12px;color:#888;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #333}
td{padding:12px 14px;border-bottom:1px solid #1a1a2e;font-size:13px}
tr:hover{background:rgba(233,69,96,.05)}
.score-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
.score-dot.high{background:#00d4aa}
.score-dot.mid{background:#e9a820}
.score-dot.low{background:#888}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;margin:1px}
.tag.match{background:rgba(0,212,170,.15);color:#00d4aa}
.tag.missing{background:rgba(136,136,136,.15);color:#888}
.detail-row{display:none}
.detail-row.show{display:table-row}
.detail-row td{background:#0a0a1a;padding:16px 24px;font-size:13px;line-height:1.8}
.counter{color:#e94560;font-weight:600;font-size:24px}
.input-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:12px}
.input-row textarea{min-height:80px;font-size:13px;flex:1}
</style>
</head>
<body>
<div class="sidebar">
  <h2>📋 批量简历匹配</h2>
  <p>贴一次JD，多份简历批量对比，自动排名。</p>
  <p style="margin-top:8px">所有计算在本地浏览器完成，不上传任何数据。</p>
  <p style="margin-top:auto;padding-top:24px;color:#555;font-size:11px">beiyu-notes<br>江夜 & 北屿<br>2026.06</p>
</div>
<div class="main">
  <div class="card">
    <h3>📌 怎么用</h3>
    <p style="color:#888;font-size:13px;line-height:2">
      1. 贴一份 <b>职位描述（JD）</b><br>
      2. 贴多份 <b>候选人简历</b>——用 <b>---</b> 分隔（三个横杠在一行）<br>
      3. 点 <b>「批量匹配」</b><br>
      4. 看排名表——点击候选人名字展开详情
    </p>
  </div>

  <div class="card">
    <h3>📝 职位描述 (JD)</h3>
    <textarea id="jd" placeholder="粘贴职位描述...&#10;&#10;例如：&#10;负责AI Agent产品的用户侧交互设计...&#10;熟悉LLM应用、Prompt Engineering...&#10;具备Skill开发和全链路策略设计经验..."></textarea>
  </div>

  <div class="card">
    <h3>👥 候选人简历 <span style="color:#888;font-size:12px;font-weight:normal;">—— 用 --- 分隔多份</span></h3>
    <textarea id="resumes" placeholder="粘贴多份简历，用 --- 分隔&#10;&#10;例如：&#10;张三 | 3年AI产品 | LangChain/RAG&#10;---&#10;李四 | 5年后端 | Python/Go/K8s&#10;---&#10;王五 | 2年AI策略 | Agent设计/prompt工程" style="min-height:240px"></textarea>
  </div>

  <div style="text-align:center;margin:16px 0">
    <button class="btn" onclick="batchAnalyze()" style="font-size:16px;padding:14px 48px">🔍 批量匹配 (<span id="resumeCount">0</span> 份简历)</button>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <h3>📊 匹配排名</h3>
    <table><thead><tr><th>排名</th><th>候选人</th><th>匹配度</th><th>操作</th></tr></thead><tbody id="resultTable"></tbody></table>
  </div>
</div>

<script>
const AI_PATTERNS = [
  /\b(AI|人工智能|agent|智能体|大模型|LLM|GPT|Claude|DeepSeek|通义|文心|豆包|Grok|Gemini|Copilot|Codex|Cursor)\b/gi,
  /\b(skill|技能|prompt|提示词|RAG|检索增强|function.?call|工具调用|tool.?use|MCP|plugin|插件|API|微调|fine.?tun|embedding|向量|RLHF)\b/gi,
  /\b(agentic|自主|规划|planning|reasoning|推理|chain.?of.?thought|思维链|multi.?agent|多智能体|orchestrat|编排|workflow|工作流|pipeline|全链路)\b/gi,
  /\b(策略|strategy|end.?to.?end|产品|product|用户|user|体验|UX|交互|interaction|设计|design|数据|data|分析|analytics|指标|metric|AB|实验|增长)\b/gi,
  /\b(Python|Java|TypeScript|React|Vue|Node|FastAPI|Flask|Docker|K8s|k8s|云原生|cloud|Git|Linux)\b/gi,
  /\b(沟通|协作|团队|项目管理|需求|owner|ownership|自驱|迭代|优化|敏捷|scrum|跨部门)\b/gi,
];

function extractKeywords(text) {
  const found = [];
  const seen = new Set();
  for (const p of AI_PATTERNS) {
    let m;
    while ((m = p.exec(text)) !== null) {
      const kw = m[0].toLowerCase();
      if (!seen.has(kw)) { seen.add(kw); found.push(kw); }
    }
  }
  return found;
}

function matchScore(jdKw, resumeKw) {
  const jdSet = new Set(jdKw);
  const resumeSet = new Set(resumeKw);
  let matched = [], missing = [];

  for (const kw of jdKw) {
    let found = false;
    for (const rk of resumeKw) {
      if (kw === rk || kw.includes(rk) || rk.includes(kw)) { matched.push(kw); found = true; break; }
    }
    if (!found) missing.push(kw);
  }

  const total = jdKw.length || 1;
  const overlap = [...jdSet].filter(k => resumeSet.has(k)).length;
  const overlapBonus = (overlap / Math.max(jdSet.size, 1)) * 0.3;
  const score = Math.min(100, Math.round((matched.length / total) * 70 + overlapBonus * 100));
  return { score, matched: [...new Set(matched)], missing };
}

function updateCount() {
  const text = document.getElementById('resumes').value.trim();
  const count = text ? text.split('\n---\n').filter(s => s.trim()).length : 0;
  document.getElementById('resumeCount').textContent = count;
}
document.getElementById('resumes').addEventListener('input', updateCount);

function batchAnalyze() {
  const jd = document.getElementById('jd').value.trim();
  const resumesText = document.getElementById('resumes').value.trim();
  if (!jd || !resumesText) { alert('请填写JD和至少一份简历'); return; }

  const parts = resumesText.split('\n---\n').filter(s => s.trim());
  if (parts.length === 0) { alert('未检测到简历，请用 --- 分隔多份简历'); return; }

  const jdKw = extractKeywords(jd);
  const results = [];

  for (let i = 0; i < parts.length; i++) {
    const resume = parts[i].trim();
    const lines = resume.split('\n');
    const name = lines[0]?.replace(/[|｜\s\-:：].*$/, '').trim() || ('候选人 ' + (i+1));
    const resumeKw = extractKeywords(resume);
    const { score, matched, missing } = matchScore(jdKw, resumeKw);
    results.push({ name, score, matched, missing, resume, i: i+1 });
  }

  results.sort((a, b) => b.score - a.score);

  let html = '';
  results.forEach((r, idx) => {
    const dotClass = r.score >= 70 ? 'high' : r.score >= 40 ? 'mid' : 'low';
    const status = r.score >= 70 ? '✅ 推荐' : r.score >= 40 ? '⚠️ 待定' : '❌ 不推荐';
    html += `<tr>
      <td><span class="counter">${idx+1}</span></td>
      <td><a href="javascript:void(0)" onclick="toggleDetail(${r.i})" style="color:#e0e0e0;text-decoration:none;font-weight:600">${r.name}</a><br><small style="color:#888">${status}</small></td>
      <td><span class="score-dot ${dotClass}"></span><strong>${r.score}%</strong></td>
      <td><button class="btn-sm" onclick="toggleDetail(${r.i})">详情</button></td>
    </tr>
    <tr class="detail-row" id="detail-${r.i}">
      <td colspan="4">
        <div style="margin:4px 0"><strong>简历摘要：</strong>${r.resume.substring(0,200).replace(/\n/g,'<br>')}...</div>
        <div style="margin:8px 0"><strong style="color:#00d4aa">✅ JD要求且有：</strong>${r.matched.length ? r.matched.slice(0,15).map(k=>'<span class="tag match">'+k+'</span>').join(' ') : '（无直接匹配，建议查看实际项目经验）'}</div>
        <div style="margin:8px 0"><strong style="color:#888">❌ JD要求但缺失：</strong>${r.missing.length ? r.missing.slice(0,10).map(k=>'<span class="tag missing">'+k+'</span>').join(' ') + (r.missing.length>10?' ...等'+r.missing.length+'项':'') : '（完全覆盖）'}</div>
        <div style="margin:8px 0;color:#888;font-size:12px">💡 关键词匹配仅供参考——候选人可能用不同表述描述相同能力。</div>
      </td>
    </tr>`;
  });

  document.getElementById('resultTable').innerHTML = html;
  document.getElementById('resultCard').style.display = 'block';
}

function toggleDetail(i) {
  const row = document.getElementById('detail-' + i);
  if (row) row.classList.toggle('show');
}
</script>
</body>
</html>
